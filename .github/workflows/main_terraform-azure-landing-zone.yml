name: Terraform Azure Landing Zone - Dev

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  terraform-dev:
    runs-on: windows-latest
    permissions:
      id-token: write # required for OIDC login to Azure
      contents: read # required for actions/checkout
    defaults:
      run:
        working-directory: ./platforms/dev
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Login to Azure using OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        run: terraform init
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: true

          TF_VAR_location: ${{ vars.TF_VAR_location }}
          TF_VAR_prefix: ${{ vars.TF_VAR_prefix }}
          TF_VAR_environment: ${{ vars.TF_VAR_environment }}

      - name: Terraform Validate
        run: terraform validate
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: true

      - name: Terraform Plan
        run: terraform plan -no-color -out=tfplan
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: true

      - name: Show Terraform Plan
        run: terraform show -no-color tfplan
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: true

          TF_VAR_location: ${{ vars.TF_VAR_location }}
          TF_VAR_prefix: ${{ vars.TF_VAR_prefix }}
          TF_VAR_environment: ${{ vars.TF_VAR_environment }}

      # - name: Terraform Apply
      #   run: terraform apply -auto-approve tfplan
      #   env:
      #     ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      #     ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      #     ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      #     ARM_USE_OIDC: true
      #     TF_VAR_location: ${{ vars.TF_VAR_location }}
      #     TF_VAR_prefix: ${{ vars.TF_VAR_prefix }}
      #     TF_VAR_environment: ${{ vars.TF_VAR_environment }}